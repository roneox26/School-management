
{% extends "base.html" %}

{% block page_title %}Add Exam{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="fas fa-plus me-2"></i>Add New Exam</h4>
    <a href="{{ url_for('exams') }}" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back to Exams
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-custom text-white">
                <h5 class="mb-0"><i class="fas fa-graduation-cap me-2"></i>Exam Details</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Exam Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Class</label>
                            <select name="class_id" class="form-select" required>
                                <option value="">Select Class</option>
                                {% for class in classes %}
                                    <option value="{{ class.id }}">{{ class.name }} - {{ class.section }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Subject</label>
                            <input type="text" class="form-control" name="subject" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Exam Date</label>
                            <input type="date" class="form-control" name="exam_date" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Total Marks</label>
                            <input type="number" class="form-control" name="total_marks" required min="1">
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('exams') }}" class="btn btn-outline-secondary me-2">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-custom">
                            <i class="fas fa-save me-2"></i>Add Exam
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.required::after {
    content: " *";
    color: red;
}
</style>
{% endblock %}
