services:
  - type: web
    name: school-management
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    pythonVersion: 3.11
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "True"
    envVarReferences:
      DATABASE_URL: ${POSTGRES_DATABASE_URL}

  - type: pserv
    name: school-management-postgres
    plan: free
    ipAllowList: []
    postgresMajorVersion: 15
